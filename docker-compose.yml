# ─────────────────────────────────────────────────────────────────────────────
# Mattermost — Self-Hosted Team Communication
# Replaces Slack. Accessible at chat.wisdomignited.com
#
# First run: docker compose up -d
# Admin setup: visit https://chat.wisdomignited.com and complete wizard
# ─────────────────────────────────────────────────────────────────────────────
version: '3.9'

services:
  postgres:
    image: postgres:15-alpine
    container_name: mm-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${MM_DB_USER:-mattermost}
      POSTGRES_PASSWORD: ${MM_DB_PASSWORD}
      POSTGRES_DB: ${MM_DB_NAME:-mattermost}
    volumes:
      - mm-postgres-data:/var/lib/postgresql/data
    networks:
      - mm-net
    healthcheck:
      test: ["CMD", "pg_isready", "-U", "mattermost"]
      interval: 30s
      timeout: 10s
      retries: 3

  mattermost:
    image: mattermost/mattermost-team-edition:latest
    container_name: mattermost
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      MM_SQLSETTINGS_DRIVERNAME: postgres
      MM_SQLSETTINGS_DATASOURCE: postgres://${MM_DB_USER:-mattermost}:${MM_DB_PASSWORD}@postgres:5432/${MM_DB_NAME:-mattermost}?sslmode=disable
      MM_SERVICESETTINGS_SITEURL: https://chat.wisdomignited.com
      MM_SERVICESETTINGS_LISTENADDRESS: :8065
      MM_TEAMSETTINGS_SITENAME: "Wisdom Ignited Ops"
      MM_EMAILSETTINGS_ENABLESIGNUPWITHEMAIL: "true"
      MM_EMAILSETTINGS_ENABLESIGNINWITHEMAIL: "true"
      MM_PLUGINSETTINGS_ENABLE: "true"
      MM_SERVICESETTINGS_ENABLEINCOMINGWEBHOOKS: "true"
      MM_SERVICESETTINGS_ENABLEOUTGOINGWEBHOOKS: "true"
      MM_SERVICESETTINGS_ENABLEPOSTUSERNAMEOVERRIDE: "true"
      MM_SERVICESETTINGS_ENABLEPOSTICONOVERRIDE: "true"
    ports:
      - "8065:8065"
    volumes:
      - mm-data:/mattermost/data
      - mm-logs:/mattermost/logs
      - mm-config:/mattermost/config
      - mm-plugins:/mattermost/plugins
    networks:
      - mm-net
      - ops-net        # shared with NotificationService
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8065/api/v4/system/ping"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s

volumes:
  mm-postgres-data:
  mm-data:
  mm-logs:
  mm-config:
  mm-plugins:

networks:
  mm-net:
    driver: bridge
  ops-net:
    external: true   # shared network with Plane and NotificationService
    name: wisdom-ops-net
