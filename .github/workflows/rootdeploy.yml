name: Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: production
      url: https://chat.wisdomignited.com
    steps:
      - uses: actions/checkout@v4

      - name: Setup SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SERVER_SSH_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -H 37.27.214.143 >> ~/.ssh/known_hosts

      - name: Sync and restart
        run: |
          rsync -avz \
            --exclude='.git/' \
            --exclude='.env' \
            -e "ssh -i ~/.ssh/deploy_key -o StrictHostKeyChecking=no" \
            ./ root@37.27.214.143:/opt/wisdom-mattermost/
          ssh -i ~/.ssh/deploy_key -o StrictHostKeyChecking=no root@37.27.214.143 \
            "cd /opt/wisdom-mattermost && docker compose pull && docker compose up -d && echo '✅ Mattermost updated'"
